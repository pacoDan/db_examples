version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Pi3141592654!
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Pi3141592654!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  mssql-tools:
    image: mcr.microsoft.com/mssql-tools
    container_name: mssql-tools
    restart: "no"
    network_mode: "service:sqlserver"  # Usamos la red de sqlserver para conexión
    depends_on:
      - sqlserver
    entrypoint: ["tail", "-f", "/dev/null"]  # Mantiene el contenedor en ejecución sin hacer nada

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  sqlserver_data: